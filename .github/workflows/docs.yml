name: Docs

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-hygiene:
    name: Docs hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate docs directory
        run: |
          set -euo pipefail

          test -d docs
          test -s docs/PRD.md

      - name: Validate markdown paths
        run: |
          set -euo pipefail

          find . -type f -name '*.md' -not -path './.git/*' -print | sort > markdown-files.txt
          test -s markdown-files.txt

          while IFS= read -r file; do
            test -s "$file"
          done < markdown-files.txt

      - name: Validate docs package surface
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const files = new Set(pkg.files || []);
          const scripts = pkg.scripts || {};

          for (const required of ['docs', 'README.md', 'CHANGELOG.md']) {
            if (!files.has(required)) {
              throw new Error(`package files allowlist is missing ${required}`);
            }
          }

          for (const script of ['package:smoke', 'release:check']) {
            if (!scripts[script]) {
              throw new Error(`package.json is missing scripts.${script}`);
            }
          }
          NODE
